    <!-- ══════════════════════════════════════════════════════════════════════
         JSON-LD Structured Data
         Two blocks (WebSite / SearchAction removed — Google deprecated the
         Sitelinks Search Box on 21 Nov 2024; the markup no longer does anything):

           1. Organization  — tells Google who you are; powers Knowledge Panel
           2. LocalBusiness — tells Google WHERE you are; powers Maps / "near me"

         HIGH-VALUE schema to add on individual pages (via your Seo component):
           • Product     — on /products/:slug  → price, rating stars in results
           • ItemList    — on /collections/:slug → rich list result
           • BreadcrumbList — on all inner pages → breadcrumb trail in results
         ══════════════════════════════════════════════════════════════════════ -->

    <!-- 1. Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    </script>
